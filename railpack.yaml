name: nyaya-voice
description: Voice-first multilingual legal aid assistant for underserved Indian communities

start: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 1 --log-level info

build:
  - pip install -r requirements.txt

env:
  PORT: "8000"
  PYTHONPATH: "."
  QDRANT_URL: ":memory:"
